name: QA and Review Agents

on:
  issues:
    types: [labeled]

jobs:
  # ── QA Agent ──────────────────────────────────────────────────────────────
  qa:
    if: github.event.label.name == 'agent:qa'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure Git
        run: |
          git config user.name "QA Agent"
          git config user.email "agent-qa@noreply.github.com"

      - name: Find sprint folder
        id: sprint
        run: |
          SPRINT_DATE=$(ls -d sprints/*/issue_${{ github.event.issue.number }} 2>/dev/null | head -1 | cut -d'/' -f2)
          echo "date=$SPRINT_DATE" >> $GITHUB_OUTPUT

      - name: Run QA Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          SPRINT_DATE: ${{ steps.sprint.outputs.date }}
        run: |
          claude --print \
            --allowedTools "Read,Write,Bash,mcp__github__*" \
            "You are the QA Agent. Issue #$ISSUE_NUMBER.

            Sprint folder: sprints/$SPRINT_DATE/issue_$ISSUE_NUMBER/

            Follow agents/qa_agent.md exactly.
            Run all automated checks (lint, test, build).
            Write test_result.md.
            File GitHub Issues for any bugs found.
            Apply label 'agent:review' if QA passes, or 'human-review-needed' if critical failures exist.
            Remove label 'agent:qa'.
            Post a summary comment on issue #$ISSUE_NUMBER."

      - name: Commit QA results
        run: |
          git add sprints/
          git diff --staged --quiet || git commit -m "[Agent:QA] Test results for issue #${{ github.event.issue.number }}"
          git push

  # ── Review Agent ──────────────────────────────────────────────────────────
  review:
    if: github.event.label.name == 'agent:review'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    strategy:
      matrix:
        review_instance: [1, 2, 3]  # 3 independent review agents in parallel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure Git
        run: |
          git config user.name "Review Agent ${{ matrix.review_instance }}"
          git config user.email "agent-review-${{ matrix.review_instance }}@noreply.github.com"

      - name: Find sprint folder
        id: sprint
        run: |
          SPRINT_DATE=$(ls -d sprints/*/issue_${{ github.event.issue.number }} 2>/dev/null | head -1 | cut -d'/' -f2)
          echo "date=$SPRINT_DATE" >> $GITHUB_OUTPUT

      - name: Run Review Agent ${{ matrix.review_instance }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          SPRINT_DATE: ${{ steps.sprint.outputs.date }}
          REVIEW_INSTANCE: ${{ matrix.review_instance }}
        run: |
          IS_LAST="false"
          if [ "$REVIEW_INSTANCE" = "3" ]; then IS_LAST="true"; fi

          claude --print \
            --allowedTools "Read,Write,Bash,mcp__github__*" \
            "You are Review Agent $REVIEW_INSTANCE of 3. Issue #$ISSUE_NUMBER.

            Sprint folder: sprints/$SPRINT_DATE/issue_$ISSUE_NUMBER/

            Follow agents/review_agent.md exactly. Your instance ID is $REVIEW_INSTANCE.
            Write review_$REVIEW_INSTANCE.md.

            $([ '$IS_LAST' = 'true' ] && echo 'You are the final review instance. After writing your review, aggregate all review files into review_aggregate.md. Then apply label human-review-needed and remove agent:review. Post a human reviewer brief on issue #$ISSUE_NUMBER.')"

      - name: Commit review
        run: |
          git add sprints/
          git diff --staged --quiet || git commit -m "[Agent:Review-${{ matrix.review_instance }}] Code review for issue #${{ github.event.issue.number }}"
          git push
